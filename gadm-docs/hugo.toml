baseURL = 'https://docs.worldlines.dev'
languageCode = 'en-us'
title = 'GADM API'
theme = 'hugo-book'

# Built site: ./public (Docker image + local `hugo`). Not committed.
publishDir = 'public'

# Allow <code>…</code> (and similar) in Markdown when using shortcodes in prose.
[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
  style = "emacs"   
  lineNos = false

[params]
  apiBaseUrl = 'api.worldlines.org'
  queryParamPageSize = "page-size"
  queryParamStartAt = "start-at"
  queryParamGid = "gid-"
  pathFeatureCollection = "/api/v1/fc/"
  pathGeojsonl = "/api/v1/geojsonl/"
  pathReverseGeocode = "/api/v1/reverse-geocode/"
